name: Build IPA (NO PATCH)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from"
        default: "Master"
        required: true
        type: string
      ipa_url:
        description: "URL to a decrypted Spotify IPA (optional — IPA build is skipped if empty)"
        default: ""
        required: false
        type: string

env:
  THEOS: ${{ github.workspace }}/theos
  SWIFTPROTOBUF_VERSION: "1.29.0"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          submodules: recursive

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2.0'

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: ${{ github.workspace }}/theos
          submodules: recursive

      - name: Install build tools
        run: |
          brew install make dpkg ldid wget
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
          python3 -m pip install --upgrade --break-system-packages \
              git+https://github.com/asdfzxcvbn/pyzule-rw.git
          # releases/latest/download redirect avoids api.github.com rate limit (anon 60/hr -> 403)
          ARCH=$(uname -m); [ "$ARCH" = "x86_64" ] && SUFFIX=macos-amd64 || SUFFIX=macos-arm64
          sudo curl -fsSL "https://github.com/asdfzxcvbn/ipapatch/releases/latest/download/ipapatch.${SUFFIX}" \
              -o /usr/local/bin/ipapatch
          sudo chmod +x /usr/local/bin/ipapatch
          ipapatch --help >/dev/null

      - name: Build EeveeSwiftProtobuf.framework from source
        env:
          SWIFTPROTOBUF_VERSION: ${{ env.SWIFTPROTOBUF_VERSION }}
        run: |
          chmod +x Tools/SwiftProtobufBuild/build-eeveeswiftprotobuf.sh
          Tools/SwiftProtobufBuild/build-eeveeswiftprotobuf.sh

      - name: Build .deb (rootless)
        run: |
          THEOS_PACKAGE_SCHEME=rootless make package FINALPACKAGE=1
          DEB_PATH=$(find packages -name "com.eevee.spotify_*.deb" | head -1)
          [ -n "$DEB_PATH" ] || { echo "deb not produced" >&2; exit 1; }
          echo "DEB_PATH=$DEB_PATH"   >> $GITHUB_ENV
          echo "DEB_NAME=$(basename "$DEB_PATH")" >> $GITHUB_ENV

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DEB_NAME }}
          path: ${{ env.DEB_PATH }}
          if-no-files-found: error

      # ─── IPA build (only when ipa_url is provided) ───────────────────

      - name: Validate vanilla IPA
        if: ${{ inputs.ipa_url != '' }}
        run: |
          wget "${{ inputs.ipa_url }}" --no-verbose -O ${{ github.workspace }}/spotify.ipa
          file_type=$(file --mime-type -b ${{ github.workspace }}/spotify.ipa)
          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Not a valid IPA: $file_type"
            exit 1
          fi

      #- name: Build zxPluginsInject.dylib
       # if: ${{ inputs.ipa_url != '' }}
        #run: |
         # chmod +x Tools/build-zxpi.sh
          # Tools/build-zxpi.sh

      - name: Fetch OpenSpotifySafariExtension.appex
        if: ${{ inputs.ipa_url != '' }}
        run: |
          EXT_DIR="$RUNNER_TEMP/OpenSpotifySafariExtension"
          rm -rf "$EXT_DIR"
          git clone --depth 1 https://github.com/BillyCurtis/OpenSpotifySafariExtension.git "$EXT_DIR"
          EXT_SRC="$EXT_DIR/OpenSpotifySafariExtension.appex"
          [ -e "$EXT_SRC" ] || { echo "OpenSpotifySafariExtension.appex not found in repo" >&2; exit 1; }
          echo "OPENSPOTIFY_APPEX=$EXT_SRC" >> $GITHUB_ENV

      - name: Inject deb + framework into IPA (cyan)
        if: ${{ inputs.ipa_url != '' }}
        run: |
          mkdir -p Outputs/IPAS
          DEB_EXTRACT="$RUNNER_TEMP/deb-extract"
          mkdir -p "$DEB_EXTRACT"
          dpkg-deb -R "$DEB_PATH" "$DEB_EXTRACT"

          DYLIB_SRC=$(find "$DEB_EXTRACT" -name 'EeveeSpotify.dylib' | head -1)
          BUNDLE_SRC=$(find "$DEB_EXTRACT" -type d -name 'EeveeSpotify.bundle' | head -1)
          FRAMEWORK_SRC=$(find "$DEB_EXTRACT" -type d -name 'EeveeSwiftProtobuf.framework' | head -1)

          SPOT_VERSION=$(unzip -p ${{ github.workspace }}/spotify.ipa 'Payload/Spotify.app/Info.plist' \
              | plutil -extract CFBundleShortVersionString raw - 2>/dev/null || echo "unknown")
          EEVEE_VERSION=$(grep -E '^Version:' control | awk '{print $2}')
          OUT="Outputs/IPAS/EeveeSpotify-${EEVEE_VERSION}-${SPOT_VERSION}.ipa"

          INJECT=("$DYLIB_SRC")
          [ -n "$FRAMEWORK_SRC" ] && INJECT+=("$FRAMEWORK_SRC")
          [ -n "$BUNDLE_SRC" ]    && INJECT+=("$BUNDLE_SRC")

          # cyan: -du strips appex/Watch (we don't have a wildcard profile),
          # -m 15.0 sets MinimumOSVersion floor, -c 9 max compression.
          cyan -i ${{ github.workspace }}/spotify.ipa -o "$OUT" \
               -f "${INJECT[@]}" -c 9 -m 15.0 -du
          echo "OUT_IPA=$OUT" >> $GITHUB_ENV

      - name: Add OpenSpotifySafariExtension.appex to IPA Plugins
        if: ${{ inputs.ipa_url != '' }}
        run: |
          cd "$(dirname "$OUT_IPA")"
          rm -rf Payload
          unzip -q "$(basename "$OUT_IPA")"

          mkdir -p "Payload/Spotify.app/Plugins"
          rm -rf "Payload/Spotify.app/Plugins/OpenSpotifySafariExtension.appex"
          cp -R "$OPENSPOTIFY_APPEX" "Payload/Spotify.app/Plugins/OpenSpotifySafariExtension.appex"

          # Repack only the Payload folder back into the IPA
          zip -qry "$(basename "$OUT_IPA")" Payload
          rm -rf Payload

      # NOTE: Removed the post-injection ipapatch step.
      # If you later need it back, restore the "LC-inject zxPluginsInject (ipapatch)" step.

      - name: Strip Watch app (if any survived)
        if: ${{ inputs.ipa_url != '' }}
        run: |
          cd "$(dirname "$OUT_IPA")"
          rm -rf Payload
          unzip -q "$(basename "$OUT_IPA")"
          if [ -d "Payload/Spotify.app/Watch" ]; then
            rm -rf Payload/Spotify.app/Watch
            zip -qry "$(basename "$OUT_IPA")" Payload
          fi
          rm -rf Payload

      - name: Upload IPA artifact
        if: ${{ inputs.ipa_url != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: EeveeSpotify-IPA
          path: ${{ env.OUT_IPA }}
          if-no-files-found: error
