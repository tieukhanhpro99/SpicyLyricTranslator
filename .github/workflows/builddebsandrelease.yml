name: Build .debs and draft release them

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to create/use for the draft release (e.g. v6.6.3)"
        required: true
        default: "v6.6.3"
      release_name:
        description: "Release title (optional)"
        required: false
        default: ""
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

env:
  THEOS: ${{ github.workspace }}/theos
  SWIFTPROTOBUF_VERSION: "1.29.0"

jobs:
  build-debs:
    name: Build arm64 + arm .debs
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2.0"

      - name: Checkout Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: ${{ github.workspace }}/theos
          submodules: recursive

      - name: Install build tools
        run: |
          brew install make dpkg ldid
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Build EeveeSwiftProtobuf.framework (required once)
        run: |
          make build-eeveeswiftprotobuf

      - name: Build arm64 .deb
        run: |
          make clean || true
          make package FINALPACKAGE=1 ARCHS="arm64"
          ls -la packages || true

      - name: Save arm64 artifact
        run: |
          mkdir -p Outputs/DEBS
          # pick newest deb produced by Theos
          ARM64_DEB="$(ls -t packages/*.deb | head -n 1)"
          cp -f "$ARM64_DEB" "Outputs/DEBS/$(basename "$ARM64_DEB" .deb)_arm64.deb"
          echo "ARM64_DEB=Outputs/DEBS/$(basename "$ARM64_DEB" .deb)_arm64.deb" >> "$GITHUB_ENV"

      - name: Build arm (armv7) .deb
        run: |
          make clean || true
          make package FINALPACKAGE=1 ARCHS="armv7"
          ls -la packages || true

      - name: Save arm artifact
        run: |
          mkdir -p Outputs/DEBS
          ARM_DEB="$(ls -t packages/*.deb | head -n 1)"
          cp -f "$ARM_DEB" "Outputs/DEBS/$(basename "$ARM_DEB" .deb)_arm.deb"
          echo "ARM_DEB=Outputs/DEBS/$(basename "$ARM_DEB" .deb)_arm.deb" >> "$GITHUB_ENV"

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EeveeSpotify-DEBS
          path: Outputs/DEBS/*.deb
          if-no-files-found: error

      - name: Draft GitHub Release and attach .debs
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.tag }}
          draft: true
          files: |
            ${{ env.ARM64_DEB }}
            ${{ env.ARM_DEB }}

