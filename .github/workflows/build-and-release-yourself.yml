name: Create IPA Packages

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "URL to a decrypted Spotify IPA"
        default: ""
        required: true
        type: string
      tweak_url:
        description: "URL to a prebuilt EeveeSpotify .deb"
        default: ""
        required: true
        type: string

env:
  THEOS: ${{ github.workspace }}/theos
  SWIFTPROTOBUF_VERSION: "1.29.0"

jobs:
  inject:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2.0'

      - uses: levibostian/action-hide-sensitive-inputs@v1

      - name: Download IPA
        run: |
          wget "${{ inputs.ipa_url }}" --no-verbose -O ${{ github.workspace }}/spotify.ipa
          file_type=$(file --mime-type -b ${{ github.workspace }}/spotify.ipa)
          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Not a valid IPA: $file_type"; exit 1
          fi

      - name: Download .deb
        run: |
          wget "${{ inputs.tweak_url }}" --no-verbose -O ${{ github.workspace }}/eevee.deb
          file_type=$(file --mime-type -b ${{ github.workspace }}/eevee.deb)
          if [[ "$file_type" != "application/vnd.debian.binary-package" ]]; then
            echo "::error::Not a valid .deb: $file_type"; exit 1
          fi

      - name: Setup Theos (only needed for zxPluginsInject build)
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: ${{ github.workspace }}/theos
          submodules: recursive

      - name: Install build tools
        run: |
          brew install make dpkg ldid wget
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
          python3 -m pip install --upgrade --break-system-packages \
              git+https://github.com/asdfzxcvbn/pyzule-rw.git \
              ipapatch

      - name: Build zxPluginsInject.dylib
        run: |
          chmod +x Tools/build-zxpi.sh
          Tools/build-zxpi.sh

      - name: Inject deb into IPA (cyan)
        run: |
          mkdir -p Outputs/IPAS
          DEB_EXTRACT="$RUNNER_TEMP/deb-extract"; mkdir -p "$DEB_EXTRACT"
          dpkg-deb -R ${{ github.workspace }}/eevee.deb "$DEB_EXTRACT"

          DYLIB_SRC=$(find "$DEB_EXTRACT" -name 'EeveeSpotify.dylib' | head -1)
          BUNDLE_SRC=$(find "$DEB_EXTRACT" -type d -name 'EeveeSpotify.bundle' | head -1)
          FRAMEWORK_SRC=$(find "$DEB_EXTRACT" -type d -name 'EeveeSwiftProtobuf.framework' | head -1)

          SPOT_VERSION=$(unzip -p ${{ github.workspace }}/spotify.ipa 'Payload/Spotify.app/Info.plist' \
              | plutil -extract CFBundleShortVersionString raw - 2>/dev/null || echo "unknown")
          OUT="Outputs/IPAS/EeveeSpotify-${SPOT_VERSION}.ipa"

          INJECT=("$DYLIB_SRC")
          [ -n "$FRAMEWORK_SRC" ] && INJECT+=("$FRAMEWORK_SRC")
          [ -n "$BUNDLE_SRC" ]    && INJECT+=("$BUNDLE_SRC")

          cyan -i ${{ github.workspace }}/spotify.ipa -o "$OUT" \
               -f "${INJECT[@]}" -c 9 -m 15.0 -du
          echo "OUT_IPA=$OUT" >> $GITHUB_ENV

      - name: LC-inject zxPluginsInject (ipapatch)
        run: |
          ipapatch --input "$OUT_IPA" --inplace --noconfirm \
                   --dylib packages/zxPluginsInject.dylib

      - name: Strip Watch app (if any survived)
        run: |
          cd "$(dirname "$OUT_IPA")"
          rm -rf Payload
          unzip -q "$(basename "$OUT_IPA")"
          if [ -d "Payload/Spotify.app/Watch" ]; then
            rm -rf Payload/Spotify.app/Watch
            zip -qry "$(basename "$OUT_IPA")" Payload
          fi
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: EeveeSpotify-IPA
          path: ${{ env.OUT_IPA }}
          if-no-files-found: error
