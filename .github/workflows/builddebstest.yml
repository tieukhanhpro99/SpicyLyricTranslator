name: Build rootless + roothide .deb + Draft Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to create/use for the draft release (e.g. v6.6.3.1)"
        required: true
        default: "v6.6.3.1"
      release_name:
        description: "Release title (optional)"
        required: false
        default: ""
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

env:
  THEOS: ${{ github.workspace }}/theos
  SWIFTPROTOBUF_VERSION: "1.29.0"

jobs:
  build-debs:
    name: Build arm64 .debs
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2.0"

      - name: Checkout Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: ${{ github.workspace }}/theos
          submodules: recursive

      - name: Install build tools
        run: |
          brew install make dpkg ldid
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Build EeveeSwiftProtobuf.framework (required once)
        run: |
          make build-eeveeswiftprotobuf

      - name: Install EeveeSwiftProtobuf into Theos
        run: |
          # Find the built framework (adjust if your build script outputs somewhere specific)
          FW=$(find "$GITHUB_WORKSPACE" -name "EeveeSwiftProtobuf.framework" -type d | head -n 1)
          [ -n "$FW" ] || { echo "EeveeSwiftProtobuf.framework not found" >&2; exit 1; }

          mkdir -p "$THEOS/vendor/lib"
          rm -rf "$THEOS/vendor/lib/EeveeSwiftProtobuf.framework"
          cp -R "$FW" "$THEOS/vendor/lib/EeveeSwiftProtobuf.framework"

      - name: Build rootless arm64 .deb
        env:
          REPO_SLUG: ${{ github.repository }}
        run: |
          make clean || true
          # Force the expected scheme so we *definitely* get the rootless .deb
          make package FINALPACKAGE=1 ARCHS="arm64" THEOS_PACKAGE_SCHEME=rootless
          ls -la packages || true

      - name: Save rootless artifact
        run: |
          mkdir -p Outputs/DEBS
          ROOTLESS_DEB="$(ls -t packages/*.deb | head -n 1)"
          cp -f "$ROOTLESS_DEB" "Outputs/DEBS/$(basename "$ROOTLESS_DEB" .deb)_rootless_arm64.deb"
          echo "ROOTLESS_DEB=Outputs/DEBS/$(basename "$ROOTLESS_DEB" .deb)_rootless_arm64.deb" >> "$GITHUB_ENV"

      - name: Build roothide arm64 .deb
        env:
          REPO_SLUG: ${{ github.repository }}
        run: |
          make clean || true
          # NOTE: This relies on Theos supporting the 'roothide' scheme in your project/toolchain.
          make package FINALPACKAGE=1 ARCHS="arm64" THEOS_PACKAGE_SCHEME=roothide
          ls -la packages || true

      - name: Save roothide artifact
        run: |
          mkdir -p Outputs/DEBS
          ROOTHIDE_DEB="$(ls -t packages/*.deb | head -n 1)"
          cp -f "$ROOTHIDE_DEB" "Outputs/DEBS/$(basename "$ROOTHIDE_DEB" .deb)_roothide_arm64.deb"
          echo "ROOTHIDE_DEB=Outputs/DEBS/$(basename "$ROOTHIDE_DEB" .deb)_roothide_arm64.deb" >> "$GITHUB_ENV"

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EeveeSpotify-DEBS
          path: Outputs/DEBS/*.deb
          if-no-files-found: error

      - name: Draft GitHub Release and attach .debs
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.tag }}
          draft: true
          prerelease: ${{ inputs.prerelease == 'true' }}
          files: |
            ${{ env.ROOTLESS_DEB }}
            ${{ env.ROOTHIDE_DEB }}
